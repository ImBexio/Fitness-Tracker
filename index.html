    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444; --good: #1b5e20; --bad: #b71c1c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 16px; }
        .tab-nav { display: flex; background: #0f172a; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: transparent; color: var(--text-muted); cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .day-box { background: #334155; padding: 10px 2px; border-radius: 4px; font-size: 0.75em; cursor: pointer; min-height: 50px; }
        .cal-header { font-weight: bold; color: var(--primary); font-size: 0.8em; }
        .cal-good { background: var(--good) !important; }
        .cal-bad { background: var(--bad) !important; }
        .progress-container { width: 100%; background-color: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; height: 20px; }
        #progressBar { height: 100%; width: 0%; transition: width 0.3s; background-color: #03dac6; }
        input, button, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: var(--primary); font-weight: bold; cursor: pointer; }
        .task-item { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 8px; border-radius: 6px; margin-top: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="dayModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
        <div class="card" style="width:90%; max-width:400px; position:relative;">
            <button onclick="closeModal()" style="width:auto; padding:5px 15px; margin-bottom:10px; background:var(--danger)">Close</button>
            <h2 id="modalDate">Date</h2>
            <div id="modalDetails"></div>
        </div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('log')">Tracker</button>
        <button class="tab-btn" onclick="switchTab('calendar')">Calendar</button>
        <button class="tab-btn" onclick="switchTab('routine')">Routine</button>
    </div>

    <div id="log" class="content active">
        <div class="card">
            <input type="date" id="dateSelector" onchange="updateUI()">
            <div class="progress-container"><div id="progressBar"></div></div>
            <h3 id="caloriesDisplay" style="text-align:center;">0 / 2000 kcal</h3>
            <label>Daily Calorie Goal: <span id="goalValue">2000</span> kcal</label>
            <input type="range" id="goalSlider" min="1000" max="4000" step="50" value="2000" oninput="updateGoal(this.value)">
        </div>
        <div class="card">
            <input type="text" id="food" placeholder="Food Name">
            <input type="number" id="cals" placeholder="Calories">
            <button onclick="addEntry()">Add Food</button>
            <div id="foodList"></div>
            <hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
            <input type="number" id="burnedCals" placeholder="Burned Calories">
            <button onclick="saveBurned()">Set Burned</button>
        </div>
        <div class="card">
            <input type="number" id="weightInput" placeholder="Weight (lbs)">
            <button onclick="saveWeight()">Save Weight</button>
            <p>Saved: <span id="savedWeightDisplay">N/A</span></p>
        </div>
        <div class="card">
            <p style="margin:0 0 8px; font-weight:bold; color:var(--text-muted); font-size:0.85em;">DATA BACKUP</p>
            <button onclick="exportData()" style="background:#0f4c75;">⬇ Export Data</button>
            <button onclick="document.getElementById('importFile').click()" style="background:#1b5e20; margin-top:6px;">⬆ Import Data</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            <p id="importStatus" style="font-size:0.8em; color:var(--text-muted); margin:6px 0 0; text-align:center;"></p>
        </div>
    </div>

    <div id="calendar" class="content">
        <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
<button onclick="changeMonth(-1)" style="width:32px;padding:4px;">◀</button>
<div id="monthTitle" style="flex:1;text-align:center;font-weight:bold;"></div>
<button onclick="changeMonth(1)" style="width:32px;padding:4px;">▶</button>
</div>
<div style="text-align:center;margin-bottom:10px;">
<button onclick="goToToday()" style="width:auto;padding:6px 14px;">Today</button>
</div>
            <div class="calendar-grid" id="calGrid"></div>
        </div>
        <div class="card">
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <button onclick="renderChart('week')" style="flex:1; padding:5px;">Week</button>
                <button onclick="renderChart('month')" style="flex:1; padding:5px;">Month</button>
                <button onclick="renderChart('year')" style="flex:1; padding:5px;">Year</button>
            </div>
            <canvas id="calorieChart"></canvas>
        </div>
    </div>

    <div id="routine" class="content">
        <div class="card">
            <select id="daySelect">
                <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
                <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
            </select>
            <input type="text" id="taskInput" placeholder="New Task">
            <button onclick="addTask()">Add Task</button>
            <div id="routineDisplay"></div>
        </div>
    </div>
</div>

<script>
    const state = {
        data: JSON.parse(localStorage.getItem('fitData') || '{}'),
        routine: JSON.parse(localStorage.getItem('myRoutine') || '{}'),
        goal: parseInt(localStorage.getItem('calGoal') || 2000)
    };
    let myChart = null;
    let currentCalendarDate = new Date();

    function switchTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'calendar') { renderCalendar(); renderChart('week'); }
        if(id === 'routine') renderRoutine();
    }

    function renderChart(range = 'week') {
        const ctx = document.getElementById('calorieChart').getContext('2d');
        const labels = [];
        const data = [];
        let daysToLookBack = (range === 'month') ? 30 : (range === 'year') ? 365 : 7;
        
        for (let i = daysToLookBack; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateKey = d.toISOString().split('T')[0];
            const dayData = state.data[dateKey] || { total: 0, burned: 0 };
            
            if (range === 'week') labels.push(d.toLocaleDateString(undefined, { weekday: 'short' }));
            else if (range === 'month') labels.push(d.getDate() === 1 ? d.toLocaleDateString(undefined, { month: 'short' }) : '');
            else labels.push(d.getMonth() === 0 && d.getDate() === 1 ? d.getFullYear() : '');
            
            data.push((dayData.total || 0) - (dayData.burned || 0));
        }

        const goalLine = Array(data.length).fill(state.goal);

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: labels, datasets: [
                { label: 'Net Cals', data: data, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)', fill: true, tension: 0.3, pointRadius: (range === 'year') ? 0 : 3 },
                { label: 'Goal', data: goalLine, borderColor: '#f59e0b', borderWidth: 1.5, borderDash: [6, 4], pointRadius: 0, fill: false, tension: 0 }
            ]},
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }, x: { ticks: { color: '#94a3b8' }, grid: { display: false } } } }
        });
    }

    function updateGoal(val) {
        state.goal = parseInt(val);
        document.getElementById('goalValue').innerText = val;
        localStorage.setItem('calGoal', state.goal);
        updateUI();
    }

    function updateUI() {
        const date = document.getElementById('dateSelector').value;
        const day = state.data[date] || { total: 0, burned: 0, items: [], weight: '' };
        document.getElementById('caloriesDisplay').innerText = `${day.total} / ${state.goal} kcal consumed`;
        document.getElementById('savedWeightDisplay').innerText = day.weight ? `${day.weight} lbs` : 'N/A';
        document.getElementById('weightInput').value = day.weight || '';
        const percent = Math.min((day.total / state.goal) * 100, 100);
        const bar = document.getElementById('progressBar');
        bar.style.width = percent + '%';
        bar.style.backgroundColor = (day.total > state.goal) ? '#b71c1c' : '#03dac6';
        document.getElementById('foodList').innerHTML = day.items.map((i, idx) => 
            `<div class="task-item">${i.name} (${i.cals} kcal) <button style="width:auto; padding:2px 8px" onclick="removeEntry(${idx})">X</button></div>`
        ).join('');
    }

    function addEntry() {
        const date = document.getElementById('dateSelector').value;
        const foodInput = document.getElementById('food');
        const calsInput = document.getElementById('cals');
        const name = foodInput.value;
        const cals = parseInt(calsInput.value) || 0;
        if (!name) return;
        if (!state.data[date]) state.data[date] = { total: 0, burned: 0, items: [], weight: '' };
        state.data[date].total += cals;
        state.data[date].items.push({ name, cals });
        localStorage.setItem('fitData', JSON.stringify(state.data));
        foodInput.value = ''; calsInput.value = '';
        updateUI();
    }

    function removeEntry(idx) {
        const date = document.getElementById('dateSelector').value;
        state.data[date].total -= state.data[date].items[idx].cals;
        state.data[date].items.splice(idx, 1);
        localStorage.setItem('fitData', JSON.stringify(state.data));
        updateUI();
    }

    function saveBurned() {
        const date = document.getElementById('dateSelector').value;
        const cals = parseInt(document.getElementById('burnedCals').value) || 0;
        if (!state.data[date]) state.data[date] = { total: 0, burned: 0, items: [], weight: '' };
        state.data[date].burned = cals;
        localStorage.setItem('fitData', JSON.stringify(state.data));
        updateUI();
    }

    function saveWeight() {
        const date = document.getElementById('dateSelector').value;
        if (!state.data[date]) state.data[date] = { total: 0, burned: 0, items: [], weight: '' };
        state.data[date].weight = document.getElementById('weightInput').value;
        localStorage.setItem('fitData', JSON.stringify(state.data));
        updateUI();
    }

    function renderCalendar() {
        const grid=document.getElementById('calGrid');
        grid.innerHTML='';
        const year=currentCalendarDate.getFullYear();
        const month=currentCalendarDate.getMonth();
        const today=new Date();

        document.getElementById('monthTitle').innerText=currentCalendarDate.toLocaleString('default',{month:'long',year:'numeric'});
        ["S","M","T","W","T","F","S"].forEach(d=>{const h=document.createElement('div');h.className='cal-header';h.innerText=d;grid.appendChild(h);});

        const first=new Date(year,month,1).getDay();
        const prevDays=new Date(year,month,0).getDate();
        const daysInMonth=new Date(year,month+1,0).getDate();

        for(let i=first-1;i>=0;i--){
            const filler=document.createElement('div');
            filler.className='day-box';
            filler.style.opacity='.35';
            filler.innerHTML=`${prevDays-i}`;
            grid.appendChild(filler);
        }

        for(let i=1; i<=daysInMonth; i++){
            const key=`${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const day=state.data[key]||{total:0,burned:0,weight:''};
            const net=(day.total||0)-(day.burned||0);
            const box=document.createElement('div');
            box.className='day-box';
            if(i===today.getDate()&&month===today.getMonth()&&year===today.getFullYear()){
                box.style.outline="2px solid #03dac6";
            }
            if((day.total||0)||(day.burned||0)){
                box.classList.add(net>state.goal?'cal-bad':'cal-good');
            }
            box.onclick=()=>showModal(key, day);
            box.innerHTML=`<strong>${i}</strong><br>${net}${day.weight?`<br><small>${day.weight}lb</small>`:''}`;
            grid.appendChild(box);
        }

        const filled=first+daysInMonth;
        const remain=(7-filled%7)%7;
        for(let i=1;i<=remain;i++){
            const filler=document.createElement('div');
            filler.className='day-box';
            filler.style.opacity='.35';
            filler.innerHTML=`${i}`;
            grid.appendChild(filler);
        }
    }

    function changeMonth(dir){
        currentCalendarDate.setMonth(currentCalendarDate.getMonth()+dir);
        renderCalendar();
    }

    function goToToday(){
        currentCalendarDate=new Date();
        renderCalendar();
    }

    function showModal(date, data) {
        document.getElementById('modalDate').innerText = date;
        document.getElementById('modalDetails').innerHTML = `<p>Consumed: <b>${data.total ?? 0}</b> | Burned: <b>${data.burned ?? 0}</b></p><p>Weight: <b>${data.weight || 'N/A'} lbs</b></p><hr><div style="max-height:200px; overflow-y:auto;">${(data.items || []).map(i => `<div>• ${i.name}: ${i.cals} kcal</div>`).join('')}</div>`;
        document.getElementById('dayModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('dayModal').style.display = 'none'; }

    function addTask() {
        const day = document.getElementById('daySelect').value;
        const task = document.getElementById('taskInput').value;
        if (!task) return;
        if (!state.routine[day]) state.routine[day] = [];
        state.routine[day].push(task);
        localStorage.setItem('myRoutine', JSON.stringify(state.routine));
        renderRoutine();
    }

    function renderRoutine() {
        const container = document.getElementById('routineDisplay');
        container.innerHTML = '';
        Object.keys(state.routine).forEach(day => {
            container.innerHTML += `<div style="margin-top:10px"><strong>${day}</strong></div>`;
            state.routine[day].forEach((t, i) => { container.innerHTML += `<div class="task-item">${t} <button style="width:auto; padding:2px 8px" onclick="removeTask('${day}',${i})">X</button></div>`; });
        });
    }

    function removeTask(day, idx) {
        state.routine[day].splice(idx, 1);
        localStorage.setItem('myRoutine', JSON.stringify(state.routine));
        renderRoutine();
    }

    function exportData() {
        const payload = {
            fitData: state.data,
            myRoutine: state.routine,
            calGoal: state.goal,
            exportedAt: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const date = new Date().toISOString().split('T')[0];
        a.href = url;
        a.download = `fittrack-backup-${date}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        const file = event.target.files[0];
        const status = document.getElementById('importStatus');
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const payload = JSON.parse(e.target.result);
                if (!payload.fitData && !payload.myRoutine) throw new Error('Invalid file format');
                if (payload.fitData) { state.data = payload.fitData; localStorage.setItem('fitData', JSON.stringify(state.data)); }
                if (payload.myRoutine) { state.routine = payload.myRoutine; localStorage.setItem('myRoutine', JSON.stringify(state.routine)); }
                if (payload.calGoal) {
                    state.goal = payload.calGoal;
                    localStorage.setItem('calGoal', state.goal);
                    document.getElementById('goalSlider').value = state.goal;
                    document.getElementById('goalValue').innerText = state.goal;
                }
                updateUI();
                status.style.color = '#03dac6';
                status.innerText = '✓ Import successful!';
            } catch (err) {
                status.style.color = '#ef4444';
                status.innerText = '✗ Invalid file — import failed.';
            }
            event.target.value = '';
            setTimeout(() => status.innerText = '', 3000);
        };
        reader.readAsText(file);
    }

    document.getElementById('dateSelector').valueAsDate = new Date();
    document.getElementById('goalSlider').value = state.goal;
    document.getElementById('goalValue').innerText = state.goal;
    updateUI();
</script>
</body>
</html>
