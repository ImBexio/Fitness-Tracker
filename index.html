<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --accent: #bb86fc; --good: #1b5e20; --bad: #b71c1c; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; }
        .tab-nav { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { background: #333; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; flex: 1; }
        .tab-btn.active { background: var(--accent); color: black; font-weight: bold; }
        .content { display: none; }
        .content.active { display: block; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; background: #333; color: white; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        button { padding: 8px 12px; background: var(--accent); color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .progress-container { width: 100%; background-color: #333; border-radius: 10px; margin: 15px 0; overflow: hidden; height: 25px; }
        #progressBar { height: 100%; width: 0%; transition: width 0.3s; background-color: #03dac6; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-box { background: #333; padding: 8px 2px; text-align: center; border-radius: 4px; font-size: 0.7em; min-height: 55px; cursor: pointer; }
        .cal-header { text-align: center; font-weight: bold; color: var(--accent); }
        .cal-good { background: var(--good) !important; }
        .cal-bad { background: var(--bad) !important; }
        .task-item { display: flex; justify-content: space-between; background: #2a2a2a; padding: 5px; margin: 2px 0; border-radius: 3px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('log')">Tracker</button>
        <button class="tab-btn" onclick="switchTab('calendar')">Calendar</button>
        <button class="tab-btn" onclick="switchTab('routine')">Routine</button>
    </div>

    <div id="log" class="content active">
        <div class="card">
            <input type="date" id="dateSelector" onchange="updateUI()">
            <p>Daily Goal: <span id="goalValue">2000</span> kcal</p>
            <input type="range" id="goalSlider" min="1000" max="4000" step="50" value="2000" oninput="updateGoal(this.value)">
            <div class="progress-container"><div id="progressBar"></div></div>
            <p id="statusText">0 / 2000 kcal</p>
            <input type="text" id="food" placeholder="Food">
            <input type="number" id="cals" placeholder="Calories">
            <button onclick="addEntry()">Add Food</button>
            <div id="foodList" style="margin-top:10px;"></div>
        </div>
        <div class="card">
            <input type="number" id="weightInput" placeholder="Weight (lbs)">
            <button onclick="saveWeight()">Save Weight</button>
            <p>Saved: <span id="savedWeightDisplay">None</span></p>
        </div>
    </div>

    <div id="calendar" class="content">
        <h3 id="monthTitle"></h3>
        <div class="calendar-grid" id="calGrid"></div>
    </div>

    <div id="routine" class="content">
        <div class="card">
            <h3>Weekly Routine</h3>
            <select id="daySelect">
                <option value="Monday">Monday</option><option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option><option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option><option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
            <input type="text" id="taskInput" placeholder="Enter task">
            <button onclick="addTask()">Add Task</button>
            <div id="routineDisplay" style="margin-top:15px;"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'calLog';
        const ROUTINE_KEY = 'myRoutine';
        let goal = parseInt(localStorage.getItem('calGoal') || 2000);

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'calendar') renderCalendar();
            if(id === 'routine') renderRoutine();
        }

        // Data Helpers
        function getData() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
        function getRoutine() { return JSON.parse(localStorage.getItem(ROUTINE_KEY) || '{}'); }

        // Tracker Logic
        function updateGoal(val) { goal = val; localStorage.setItem('calGoal', goal); document.getElementById('goalValue').innerText = goal; updateUI(); }
        
        function updateUI() {
            const date = document.getElementById('dateSelector').value;
            const data = getData()[date] || { total: 0, items: [], weight: '' };
            document.getElementById('progressBar').style.width = Math.min((data.total / goal) * 100, 100) + '%';
            document.getElementById('statusText').innerText = `${data.total} / ${goal} kcal`;
            document.getElementById('weightInput').value = data.weight || '';
            document.getElementById('savedWeightDisplay').innerText = data.weight ? data.weight + " lbs" : "None";
            // Replace the current foodList mapping line in updateUI() with this:
document.getElementById('foodList').innerHTML = data.items.map((i, index) => 
    `<div class="task-item">
        ${i.name}: ${i.cals}kcal 
        <button onclick="removeFood(${index})">X</button>
    </div>`
).join('');
        }

        function addEntry() {
            const date = document.getElementById('dateSelector').value;
            const food = document.getElementById('food').value;
            const cals = parseInt(document.getElementById('cals').value) || 0;
            if(!food) return;
            let data = getData();
            if(!data[date]) data[date] = { total: 0, items: [], weight: '' };
            data[date].total += cals;
            data[date].items.push({ name: food, cals: cals });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            document.getElementById('food').value = ''; document.getElementById('cals').value = '';
            updateUI();
        }

        function removeFood(index) {
    const date = document.getElementById('dateSelector').value;
    let data = getData();
    
    // Remove the item and subtract its calories from the total
    const removedItem = data[date].items.splice(index, 1)[0];
    data[date].total -= removedItem.cals;
    
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    updateUI();
}

        function saveWeight() {
            const date = document.getElementById('dateSelector').value;
            const weight = document.getElementById('weightInput').value;
            let data = getData();
            if(!data[date]) data[date] = { total: 0, items: [], weight: '' };
            data[date].weight = weight;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateUI();
        }

        // Routine Logic
        function addTask() {
            const day = document.getElementById('daySelect').value;
            const task = document.getElementById('taskInput').value;
            if(!task) return;
            let routine = getRoutine();
            if(!routine[day]) routine[day] = [];
            routine[day].push(task);
            localStorage.setItem(ROUTINE_KEY, JSON.stringify(routine));
            document.getElementById('taskInput').value = '';
            renderRoutine();
        }

        function removeTask(day, idx) {
            let routine = getRoutine();
            routine[day].splice(idx, 1);
            localStorage.setItem(ROUTINE_KEY, JSON.stringify(routine));
            renderRoutine();
        }

        function renderRoutine() {
            const container = document.getElementById('routineDisplay');
            container.innerHTML = '';
            const routine = getRoutine();
            ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].forEach(day => {
                const tasks = routine[day] || [];
                let html = `<div style="margin-bottom:10px;"><strong>${day}</strong>`;
                tasks.forEach((t, i) => html += `<div class="task-item">${t} <button onclick="removeTask('${day}',${i})">X</button></div>`);
                container.innerHTML += html + `</div>`;
            });
        }

        // Calendar Logic
        function renderCalendar() {
            const data = getData();
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            document.getElementById('monthTitle').innerText = now.toLocaleString('default', { month: 'long' });
            ["S","M","T","W","T","F","S"].forEach(d => grid.innerHTML += `<div class="cal-header">${d}</div>`);
            for (let i = 1; i <= daysInMonth; i++) {
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const day = data[dateKey];
                const box = document.createElement('div');
                box.className = 'day-box';
                if (day && day.total > 0) box.classList.add(day.total > goal ? 'cal-bad' : 'cal-good');
                box.innerHTML = `<strong>${i}</strong>` + (day?.total ? `<br>${day.total}` : '') + (day?.weight ? `<br>${day.weight}lbs` : '');
                box.onclick = () => {
                    const foods = day?.items?.map(it => `${it.name}: ${it.cals}kcal`).join('\n') || "No food logged.";
                    alert(`Date: ${dateKey}\nWeight: ${day?.weight || 'N/A'}\nCalories: ${day?.total || 0}\n\nFoods:\n${foods}`);
                };
                grid.appendChild(box);
            }
        }
        
        // Init
        document.getElementById('dateSelector').value = new Date().toISOString().split('T')[0];
        document.getElementById('goalSlider').value = goal;
        document.getElementById('goalValue').innerText = goal;
        updateUI();
    </script>
</body>
</html>
